<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Payment</title>

<style>
body{font-family:Arial;background:#f6f8fb;padding:20px}
.card{
  background:#fff;
  padding:20px;
  border-radius:14px;
  max-width:420px;
  margin:auto;
  box-shadow:0 4px 12px rgba(0,0,0,.08)
}
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#0a1f44;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  margin-top:15px;
}
.loader{
  display:none;
  text-align:center;
  margin-top:10px;
}
</style>
</head>
<body>

<div class="card">
  <h3 id="planTitle">Loading...</h3>
  <p>ROI: <b><span id="roi"></span>%</b></p>
  <p>Duration: <b><span id="duration"></span> days</b></p>
  <p>Amount: ₦<b id="amountText"></b></p>

  <button id="payBtn">Pay Securely</button>
  <div class="loader" id="loader">Connecting to secure server...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCQ8TCMUAySwLSBN3-0W1GV4XWateS1rqQ",
  authDomain: "zyppayx-69c54.firebaseapp.com",
  projectId: "zyppayx-69c54"
});

const auth = getAuth(app);
const db = getFirestore(app);

// ⚠️ REPLACE TOMORROW WITH YOUR CLOUD FUNCTION URL
const BASE_URL = "https://us-central1-zyppayx-69c54.cloudfunctions.net";

const params = new URLSearchParams(location.search);
const planId = params.get("planId");
const amount = Number(params.get("amount"));

document.getElementById("amountText").textContent = amount;

async function loadPlan() {
  const snap = await getDoc(doc(db, "investmentPlans", planId));
  if (!snap.exists()) return alert("Invalid plan");

  const p = snap.data();
  document.getElementById("planTitle").textContent = p.title;
  document.getElementById("roi").textContent = p.roiPercent;
  document.getElementById("duration").textContent = p.duration;
}
loadPlan();

onAuthStateChanged(auth, user => {
  if (!user) return location.href = "login.html";

  document.getElementById("payBtn").onclick = async () => {
    const loader = document.getElementById("loader");
    loader.style.display = "block";

    try {
      const res = await fetch(`${BASE_URL}/createPayment`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          email: user.email,
          userId: user.uid,
          planId,
          amount
        })
      });

      const data = await res.json();

      if (data.url) {
        window.location.href = data.url;
      } else {
        alert("Payment failed. Try again.");
        loader.style.display = "none";
      }

    } catch (err) {
      alert("Server error");
      loader.style.display = "none";
    }
  };
});
</script>

</body>
</html>
