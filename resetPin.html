<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset PIN (Secure OTP)</title>

<style>
body { font-family: Arial; background:#f6f8fb; }
.container { max-width:400px;margin:auto;padding:20px;}
.card { background:#fff;padding:20px;border-radius:12px;}
input { width:100%;padding:10px;margin-top:10px;border-radius:8px;border:1px solid #ccc;}
button { width:100%;padding:12px;margin-top:10px;background:#00c896;color:#fff;border:none;border-radius:8px;}
.success { color:green; }
.error { color:red; }
</style>
</head>

<body>

<div class="container">
<div class="card">

<h3>Reset PIN (SMS OTP)</h3>

<input type="text" id="phone" placeholder="+2348012345678">
<button id="sendOtpBtn">Send OTP</button>

<div id="recaptcha-container"></div>

<input type="text" id="otp" placeholder="Enter 6-digit OTP">
<button id="verifyOtpBtn">Verify OTP</button>

<input type="password" id="newPin" placeholder="New PIN" maxlength="4">
<input type="password" id="confirmPin" placeholder="Confirm PIN" maxlength="4">

<button id="resetBtn">Reset PIN</button>

<p id="msg"></p>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  RecaptchaVerifier,
  signInWithPhoneNumber
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCQ8TCMUAySwLSBN3-0W1GV4XWateS1rqQ",
  authDomain: "zyppayx-69c54.firebaseapp.com",
  projectId: "zyppayx-69c54",
  storageBucket: "zyppayx-69c54.appspot.com",
  messagingSenderId: "439535581166",
  appId: "1:439535581166:web:994d1c9f75bd1294ef00ff"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let confirmationResult;
let verified = false;
let currentUserId = "";
let userPhone = "";

// HASH PIN
async function hashPin(pin) {
  const enc = new TextEncoder().encode(pin);
  const hash = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

// LOAD USER DATA
onAuthStateChanged(auth, async (user) => {
  if (!user) return location.href = "login.html";

  currentUserId = user.uid;

  const snap = await getDoc(doc(db,"users",user.uid));
  if (snap.exists()) {
    userPhone = snap.data().phone || "";
  }
});

// INIT RECAPTCHA
window.recaptchaVerifier = new RecaptchaVerifier(auth, "recaptcha-container", {
  size: "normal"
});

// SEND OTP
document.getElementById("sendOtpBtn").onclick = async () => {
  const phone = document.getElementById("phone").value;
  const msg = document.getElementById("msg");

  // 🔐 CHECK PHONE MATCH
  if (phone !== userPhone) {
    msg.textContent = "Phone number does not match your account";
    msg.className = "error";
    return;
  }

  try {
    confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
    msg.textContent = "OTP sent";
    msg.className = "success";
  } catch (err) {
    msg.textContent = "Failed to send OTP";
    msg.className = "error";
  }
};

// VERIFY OTP
document.getElementById("verifyOtpBtn").onclick = async () => {
  const code = document.getElementById("otp").value;
  const msg = document.getElementById("msg");

  try {
    await confirmationResult.confirm(code);
    verified = true;
    msg.textContent = "OTP verified";
    msg.className = "success";
  } catch {
    msg.textContent = "Invalid OTP";
    msg.className = "error";
  }
};

// RESET PIN
document.getElementById("resetBtn").onclick = async () => {
  const msg = document.getElementById("msg");

  if (!verified) {
    msg.textContent = "Verify OTP first";
    msg.className = "error";
    return;
  }

  const newPin = document.getElementById("newPin").value;
  const confirmPin = document.getElementById("confirmPin").value;

  if (newPin.length !== 4) {
    msg.textContent = "PIN must be 4 digits";
    msg.className = "error";
    return;
  }

  if (newPin !== confirmPin) {
    msg.textContent = "PIN mismatch";
    msg.className = "error";
    return;
  }

  const newHash = await hashPin(newPin);

  await updateDoc(doc(db,"users",currentUserId), {
    pinHash: newHash,
    failedAttempts: 0,
    lockUntil: 0
  });

  msg.textContent = "PIN reset successful";
  msg.className = "success";
};
</script>

</body>
</html>
