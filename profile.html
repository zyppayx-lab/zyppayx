<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Profile</title>

<style>
body { font-family: Arial; background:#f6f8fb; }
.container { max-width:400px;margin:auto;padding:20px;}
.card { background:#fff;padding:20px;border-radius:12px;}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#00c896;
  color:#fff;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

button:disabled {
  background:#ccc;
  cursor:not-allowed;
}

.success { color:green; }
.error { color:red; }

.timer {
  font-size:13px;
  color:#888;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h3>Edit Profile</h3>

<input type="text" id="name" placeholder="Full Name">
<input type="text" id="username" placeholder="Username">

<input type="text" id="phone" placeholder="+2348012345678">
<button id="sendOtpBtn">Send OTP</button>

<div id="recaptcha-container"></div>
<div class="timer" id="timerText"></div>

<input type="text" id="otp" placeholder="Enter OTP">
<button id="verifyOtpBtn">Verify OTP</button>

<button id="saveBtn">Save Changes</button>

<p id="msg"></p>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  RecaptchaVerifier,
  signInWithPhoneNumber
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCQ8TCMUAySwLSBN3-0W1GV4XWateS1rqQ",
  authDomain: "zyppayx-69c54.firebaseapp.com",
  projectId: "zyppayx-69c54",
  storageBucket: "zyppayx-69c54.appspot.com",
  messagingSenderId: "439535581166",
  appId: "1:439535581166:web:994d1c9f75bd1294ef00ff"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUserId = "";
let confirmationResult;
let phoneVerified = false;
let oldPhone = "";

// 🔐 SECURITY VARIABLES
let otpAttempts = 0;
let maxAttempts = 5;
let timer = 60;
let interval;

// LOAD USER
onAuthStateChanged(auth, async (user) => {
  if (!user) return location.href = "login.html";

  currentUserId = user.uid;

  const snap = await getDoc(doc(db, "users", user.uid));
  if (snap.exists()) {
    const data = snap.data();

    document.getElementById("name").value = data.name || "";
    document.getElementById("username").value = data.username || "";
    document.getElementById("phone").value = data.phone || "";

    oldPhone = data.phone || "";
  }
});

// INIT RECAPTCHA
window.recaptchaVerifier = new RecaptchaVerifier(auth, "recaptcha-container", {
  size: "normal"
});

// TIMER FUNCTION
function startTimer() {
  const timerText = document.getElementById("timerText");
  const btn = document.getElementById("sendOtpBtn");

  btn.disabled = true;
  timer = 60;

  interval = setInterval(() => {
    timer--;
    timerText.textContent = "Resend OTP in " + timer + "s";

    if (timer <= 0) {
      clearInterval(interval);
      btn.disabled = false;
      timerText.textContent = "";
    }
  }, 1000);
}

// SEND OTP
document.getElementById("sendOtpBtn").onclick = async () => {
  const phone = document.getElementById("phone").value;
  const msg = document.getElementById("msg");

  if (!phone.startsWith("+234")) {
    msg.textContent = "Use valid Nigerian format (+234...)";
    msg.className = "error";
    return;
  }

  try {
    confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
    msg.textContent = "OTP sent";
    msg.className = "success";

    otpAttempts = 0; // reset attempts
    startTimer();

  } catch {
    msg.textContent = "Failed to send OTP";
    msg.className = "error";
  }
};

// VERIFY OTP
document.getElementById("verifyOtpBtn").onclick = async () => {
  const code = document.getElementById("otp").value;
  const msg = document.getElementById("msg");

  if (otpAttempts >= maxAttempts) {
    msg.textContent = "Too many attempts. Request new OTP.";
    msg.className = "error";
    return;
  }

  try {
    await confirmationResult.confirm(code);
    phoneVerified = true;
    msg.textContent = "Phone verified";
    msg.className = "success";

    otpAttempts = 0; // reset

  } catch {
    otpAttempts++;
    msg.textContent = "Invalid OTP (" + otpAttempts + "/" + maxAttempts + ")";
    msg.className = "error";
  }
};

// SAVE PROFILE
document.getElementById("saveBtn").onclick = async () => {
  const name = document.getElementById("name").value.trim();
  const username = document.getElementById("username").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const msg = document.getElementById("msg");

  if (!name || !username || !phone) {
    msg.textContent = "All fields required";
    msg.className = "error";
    return;
  }

  if (phone !== oldPhone && !phoneVerified) {
    msg.textContent = "Verify new phone first";
    msg.className = "error";
    return;
  }

  try {
    await updateDoc(doc(db, "users", currentUserId), {
      name,
      username,
      phone
    });

    msg.textContent = "Profile updated successfully";
    msg.className = "success";

  } catch {
    msg.textContent = "Update failed";
    msg.className = "error";
  }
};
</script>

</body>
  </html>
