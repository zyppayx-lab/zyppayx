<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Profile</title>

<style>
body { font-family: Arial; background:#f6f8fb; }

.container { max-width:400px;margin:auto;padding:20px;}
.card { background:#fff;padding:20px;border-radius:12px;}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#00c896;
  color:#fff;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.secondary {
  background:#0a1f44;
}

.danger {
  background:#e74c3c;
}

button:disabled {
  background:#ccc;
}

/* Toast */
.toast {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#333;
  color:#fff;
  padding:12px 20px;
  border-radius:8px;
  display:none;
}

/* Loader */
.loader {
  border:3px solid #fff;
  border-top:3px solid transparent;
  border-radius:50%;
  width:18px;
  height:18px;
  animation:spin 1s linear infinite;
  display:inline-block;
}

@keyframes spin {
  to { transform:rotate(360deg); }
}

.timer {
  font-size:13px;
  color:#888;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h3>Edit Profile</h3>

<input type="text" id="name" placeholder="Full Name">
<input type="text" id="username" placeholder="Username">

<input type="text" id="phone" placeholder="+2348012345678">
<button id="sendOtpBtn">Send OTP</button>

<div id="recaptcha-container"></div>
<div class="timer" id="timerText"></div>

<input type="text" id="otp" placeholder="Enter OTP">
<button id="verifyOtpBtn">Verify OTP</button>

<button id="saveBtn">Save Changes</button>

<hr>

<button class="secondary" onclick="location.href='changepin.html'">Change PIN</button>
<button class="secondary" onclick="location.href='resetpin.html'">Reset PIN</button>

<button class="danger" id="logoutBtn">Logout</button>

</div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  RecaptchaVerifier,
  signInWithPhoneNumber,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCQ8TCMUAySwLSBN3-0W1GV4XWateS1rqQ",
  authDomain: "zyppayx-69c54.firebaseapp.com",
  projectId: "zyppayx-69c54"
});

const auth = getAuth(app);
const db = getFirestore(app);

let currentUserId = "";
let confirmationResult;
let phoneVerified = false;
let oldPhone = "";

let otpAttempts = 0;
let maxAttempts = 5;
let timer = 60;
let interval;

// 🔔 TOAST
function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  setTimeout(()=> t.style.display="none",3000);
}

// LOAD USER
onAuthStateChanged(auth, async (user) => {
  if (!user) return location.href = "login.html";

  currentUserId = user.uid;

  const snap = await getDoc(doc(db, "users", user.uid));
  if (snap.exists()) {
    const data = snap.data();

    document.getElementById("name").value = data.fullName || "";
    document.getElementById("username").value = data.username || "";
    document.getElementById("phone").value = data.phone || "";

    oldPhone = data.phone || "";
  }
});

// RECAPTCHA
window.recaptchaVerifier = new RecaptchaVerifier(auth, "recaptcha-container", {
  size: "normal"
});

// TIMER
function startTimer() {
  const btn = document.getElementById("sendOtpBtn");
  const timerText = document.getElementById("timerText");

  btn.disabled = true;
  timer = 60;

  interval = setInterval(()=>{
    timer--;
    timerText.textContent = "Resend OTP in " + timer + "s";

    if(timer <= 0){
      clearInterval(interval);
      btn.disabled = false;
      timerText.textContent = "";
    }
  },1000);
}

// SEND OTP
document.getElementById("sendOtpBtn").onclick = async () => {
  const phone = document.getElementById("phone").value;

  if (!phone.startsWith("+234")) {
    showToast("Use +234 format");
    return;
  }

  try {
    confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
    showToast("OTP Sent");
    otpAttempts = 0;
    startTimer();
  } catch {
    showToast("Failed to send OTP");
  }
};

// VERIFY OTP
document.getElementById("verifyOtpBtn").onclick = async () => {
  const code = document.getElementById("otp").value;

  if (otpAttempts >= maxAttempts) {
    showToast("Too many attempts");
    return;
  }

  try {
    await confirmationResult.confirm(code);
    phoneVerified = true;
    showToast("Phone Verified");
    otpAttempts = 0;
  } catch {
    otpAttempts++;
    showToast(`Invalid OTP (${otpAttempts}/5)`);
  }
};

// SAVE PROFILE
document.getElementById("saveBtn").onclick = async () => {
  const btn = document.getElementById("saveBtn");
  const name = document.getElementById("name").value.trim();
  const username = document.getElementById("username").value.trim();
  const phone = document.getElementById("phone").value.trim();

  if (!name || !username || !phone) {
    showToast("Fill all fields");
    return;
  }

  if (phone !== oldPhone && !phoneVerified) {
    showToast("Verify new phone");
    return;
  }

  btn.innerHTML = "<span class='loader'></span>";

  try {
    await updateDoc(doc(db, "users", currentUserId), {
      fullName: name,
      username,
      phone
    });

    btn.textContent = "Save Changes";
    showToast("Profile Updated");
  } catch {
    btn.textContent = "Save Changes";
    showToast("Update Failed");
  }
};

// LOGOUT
document.getElementById("logoutBtn").onclick = async () => {
  await signOut(auth);
  location.href = "login.html";
};
</script>

</body>
</html>
