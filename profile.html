<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
body { margin:0; font-family: Arial; background:#f6f8fb;}
header { background:#0a1f44; color:#fff; padding:20px; text-align:center;}

.container {
  max-width:600px; margin:30px auto;
  background:#fff; padding:20px;
  border-radius:12px;
}

.item { margin-bottom:15px; }
.item h3 { margin:0 0 5px; font-size:14px; }
.item p { margin:0; font-size:16px; }

.btn {
  width:100%; padding:12px; margin-top:10px;
  border:none; border-radius:8px; cursor:pointer;
}
.btn-primary { background:#00c896; color:#fff; }
.btn-danger { background:red; color:#fff; }
</style>
</head>

<body>

<header>Your Profile</header>

<div class="container">

  <div class="item"><h3>Full Name</h3><p id="fullName"></p></div>
  <div class="item"><h3>Username</h3><p id="username"></p></div>
  <div class="item"><h3>Phone</h3><p id="phone"></p></div>
  <div class="item"><h3>Email</h3><p id="email"></p></div>
  <div class="item"><h3>Balance</h3><p>₦<span id="balance"></span></p></div>
  <div class="item"><h3>Referral Code</h3><p id="refCode"></p></div>
  <div class="item"><h3>Referral Link</h3><p id="refLink"></p></div>

  <button class="btn btn-primary" onclick="location.href='tier.html'">Tier Level</button>
  <button class="btn" onclick="location.href='changepin.html'">Change PIN</button>
  <button class="btn" onclick="location.href='resetpin.html'">Reset PIN</button>
  <button class="btn btn-danger" id="logout">Logout</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCQ8TCMUAySwLSBN3-0W1GV4XWateS1rqQ",
  authDomain: "zyppayx-69c54.firebaseapp.com",
  projectId: "zyppayx-69c54",
  storageBucket: "zyppayx-69c54.appspot.com",
  messagingSenderId: "439535581166",
  appId: "1:439535581166:web:994d1c9f75bd1294ef00ff"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    location.href = "login.html";
    return;
  }

  document.getElementById("email").textContent = user.email;

  try {
    const docRef = doc(db, "users", user.uid);
    const snap = await getDoc(docRef);

    if (!snap.exists()) {
      console.log("No user document found");
      return;
    }

    const data = snap.data();
    console.log("User data:", data);

    document.getElementById("fullName").textContent = data.fullName || "N/A";
    document.getElementById("username").textContent = data.username || "N/A";
    document.getElementById("phone").textContent = data.phone || "N/A";
    document.getElementById("balance").textContent = data.balance || 0;

    const refCode = data.refCode || user.uid.slice(0,6);
    document.getElementById("refCode").textContent = refCode;
    document.getElementById("refLink").textContent =
      window.location.origin + "/login.html?ref=" + refCode;

  } catch (err) {
    console.error("Error:", err);
  }
});

document.getElementById("logout").onclick = () => {
  signOut(auth).then(() => location.href = "login.html");
};
</script>

</body>
</html>
