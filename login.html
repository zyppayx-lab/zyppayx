<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zyppayxvest | Login</title>

<style>
body {
  background: #f6f8fb;
  font-family: Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.auth-box {
  background:#fff;
  width:100%;
  max-width:380px;
  padding:25px;
  border-radius:10px;
  box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

h2 { text-align:center; color:#0a1f44; }

input {
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:1px solid #ccc;
  border-radius:6px;
}

button {
  width:100%;
  padding:12px;
  background:#00c896;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.google-btn { background:#4285f4; margin-top:10px; }

.hidden { display:none; }

/* LOADER */
.loader {
  border: 4px solid #f3f3f3;
  border-top: 4px solid #00c896;
  border-radius: 50%;
  width: 25px;
  height: 25px;
  animation: spin 1s linear infinite;
  margin: auto;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #333;
  color: #fff;
  padding: 12px 20px;
  border-radius: 6px;
  display:none;
}

/* SUCCESS */
.success-check {
  font-size:50px;
  color:#00c896;
  text-align:center;
  display:none;
}
</style>
</head>

<body>

<div class="auth-box">

<h2 id="formTitle">Login</h2>

<div class="success-check" id="successCheck">✔</div>

<input type="text" id="name" placeholder="Full Name" class="hidden"/>
<input type="tel" id="phone" placeholder="Phone Number" class="hidden"/>
<input type="email" id="email" placeholder="Email"/>
<input type="password" id="password" placeholder="Password"/>
<input type="text" id="referral" placeholder="Referral Code (optional)" class="hidden"/>

<button id="submitBtn">Login</button>
<div id="loader" class="loader hidden"></div>

<button class="google-btn" id="googleBtn">Continue with Google</button>

<p style="text-align:center;margin-top:10px;">
<span id="toggleText">Don't have an account? Sign up</span>
</p>

</div>

<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCQ8TCMUAySwLSBN3-0W1GV4XWateS1rqQ",
  authDomain: "zyppayx-69c54.firebaseapp.com",
  projectId: "zyppayx-69c54",
  storageBucket: "zyppayx-69c54.appspot.com",
  messagingSenderId: "439535581166",
  appId: "1:439535581166:web:994d1c9f75bd1294ef00ff"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let isLogin = true;

const formTitle = document.getElementById("formTitle");
const submitBtn = document.getElementById("submitBtn");
const toggleText = document.getElementById("toggleText");
const loader = document.getElementById("loader");
const successCheck = document.getElementById("successCheck");

const nameInput = document.getElementById("name");
const phoneInput = document.getElementById("phone");
const referralInput = document.getElementById("referral");

const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");

function showToast(msg){
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.style.display = "block";
  setTimeout(()=> toast.style.display="none",3000);
}

function setLoading(state){
  loader.classList.toggle("hidden", !state);
  submitBtn.disabled = state;
}

// TOGGLE
toggleText.onclick = () => {
  isLogin = !isLogin;

  formTitle.textContent = isLogin ? "Login" : "Sign Up";
  submitBtn.textContent = isLogin ? "Login" : "Create Account";
  toggleText.textContent = isLogin
    ? "Don't have an account? Sign up"
    : "Already have an account? Login";

  nameInput.classList.toggle("hidden", isLogin);
  phoneInput.classList.toggle("hidden", isLogin);
  referralInput.classList.toggle("hidden", isLogin);
};

// SUBMIT
submitBtn.onclick = async () => {
  const email = emailInput.value;
  const password = passwordInput.value;

  if (!email || !password) {
    showToast("Fill all fields");
    return;
  }

  setLoading(true);

  try {
    if (isLogin) {
      await signInWithEmailAndPassword(auth, email, password);

      successCheck.style.display = "block";
      setTimeout(()=> window.location.href="dashboard.html",1000);

    } else {
      const name = nameInput.value;
      const phone = phoneInput.value;

      if (!name || !phone) {
        showToast("Enter name & phone");
        setLoading(false);
        return;
      }

      const cred = await createUserWithEmailAndPassword(auth, email, password);
      const uid = cred.user.uid;
      const refCode = uid.slice(0,6).toUpperCase();

      await setDoc(doc(db,"users",uid),{
        fullName:name,
        phone,
        email,
        balance:0,
        referralCode:refCode,
        createdAt:Date.now()
      });

      await setDoc(doc(db,"referrals",refCode),{ uid });

      successCheck.style.display = "block";
      setTimeout(()=> window.location.href="createpin.html",1000);
    }

  } catch(err){
    showToast(err.message);
  }

  setLoading(false);
};

// GOOGLE LOGIN
document.getElementById("googleBtn").onclick = async () => {
  try{
    setLoading(true);

    const result = await signInWithPopup(auth, provider);
    const user = result.user;

    const ref = doc(db,"users",user.uid);
    const snap = await getDoc(ref);

    if(!snap.exists()){
      const code = user.uid.slice(0,6).toUpperCase();

      await setDoc(ref,{
        fullName:user.displayName,
        email:user.email,
        balance:0,
        referralCode:code
      });

      await setDoc(doc(db,"referrals",code),{ uid:user.uid });
    }

    successCheck.style.display = "block";
    setTimeout(()=> window.location.href="createpin.html",1000);

  }catch(err){
    showToast(err.message);
  }

  setLoading(false);
};
</script>

</body>
  </html>
