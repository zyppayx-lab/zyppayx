<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zyppayxvest | Login</title>

<style>
body {
  background: #f6f8fb;
  font-family: Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.auth-box {
  background:#fff;
  width:100%;
  max-width:380px;
  padding:25px;
  border-radius:10px;
  box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

h2 { text-align:center; color:#0a1f44; }

input {
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:1px solid #ccc;
  border-radius:6px;
}

button {
  width:100%;
  padding:12px;
  background:#00c896;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.google-btn { background:#4285f4; margin-top:10px; }

.hidden { display:none; }

.loader {
  border: 4px solid #f3f3f3;
  border-top: 4px solid #00c896;
  border-radius: 50%;
  width: 25px;
  height: 25px;
  animation: spin 1s linear infinite;
  margin: auto;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #333;
  color: #fff;
  padding: 12px 20px;
  border-radius: 6px;
  display:none;
}

.success-check {
  font-size:50px;
  color:#00c896;
  text-align:center;
  display:none;
}
</style>
</head>

<body>

<div class="auth-box">

<h2 id="formTitle">Login</h2>

<div class="success-check" id="successCheck">✔</div>

<input type="text" id="name" placeholder="Full Name" class="hidden"/>
<input type="tel" id="phone" placeholder="Phone Number" class="hidden"/>
<input type="email" id="email" placeholder="Email"/>
<input type="password" id="password" placeholder="Password"/>
<input type="text" id="referral" placeholder="Referral Code (optional)" class="hidden"/>

<button id="submitBtn">Login</button>
<div id="loader" class="loader hidden"></div>

<button class="google-btn" id="googleBtn">Continue with Google</button>

<p style="text-align:center;margin-top:10px;">
<span id="toggleText">Don't have an account? Sign up</span>
</p>

</div>

<div id="toast" class="toast"></div>

<script>
const API = "https://zyppayxvest-backend.onrender.com";

let isLogin = true;

const formTitle = document.getElementById("formTitle");
const submitBtn = document.getElementById("submitBtn");
const toggleText = document.getElementById("toggleText");
const loader = document.getElementById("loader");
const successCheck = document.getElementById("successCheck");

const nameInput = document.getElementById("name");
const phoneInput = document.getElementById("phone");
const referralInput = document.getElementById("referral");

const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");

function showToast(msg){
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.style.display = "block";
  setTimeout(()=> toast.style.display="none",3000);
}

function setLoading(state){
  loader.classList.toggle("hidden", !state);
  submitBtn.disabled = state;
}

// TOGGLE
toggleText.onclick = () => {
  isLogin = !isLogin;

  formTitle.textContent = isLogin ? "Login" : "Sign Up";
  submitBtn.textContent = isLogin ? "Login" : "Create Account";
  toggleText.textContent = isLogin
    ? "Don't have an account? Sign up"
    : "Already have an account? Login";

  nameInput.classList.toggle("hidden", isLogin);
  phoneInput.classList.toggle("hidden", isLogin);
  referralInput.classList.toggle("hidden", isLogin);
};

// SUBMIT
submitBtn.onclick = async () => {
  const email = emailInput.value.trim();
  const password = passwordInput.value.trim();

  if (!email || !password) {
    showToast("Fill all fields");
    return;
  }

  setLoading(true);

  try {
    if (isLogin) {
      // LOGIN
      const res = await fetch(`${API}/login`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (!res.ok) throw new Error(data.detail || "Login failed");

      localStorage.setItem("token", data.access_token);
      localStorage.setItem("user", JSON.stringify(data.user));

      successCheck.style.display = "block";

      setTimeout(()=>{
        window.location.href = "dashboard.html";
      },1000);

    } else {
      // SIGNUP
      const name = nameInput.value.trim();

      if (!name) {
        showToast("Enter your name");
        setLoading(false);
        return;
      }

      const res = await fetch(`${API}/signup`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          email,
          password,
          full_name: name
        })
      });

      const data = await res.json();

      if (!res.ok) throw new Error(data.detail || "Signup failed");

      successCheck.style.display = "block";

      setTimeout(()=>{
        window.location.href = "login.html";
      },1000);
    }

  } catch(err){
    showToast(err.message);
  }

  setLoading(false);
};

// GOOGLE (disabled for now)
document.getElementById("googleBtn").onclick = () => {
  showToast("Google login not connected yet");
};
</script>

</body>
</html>
