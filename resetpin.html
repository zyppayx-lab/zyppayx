<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reset PIN (Email OTP)</title>

<style>
body { font-family: Arial; background:#f6f8fb; text-align:center; }

.container { max-width:400px;margin:auto;padding:20px;}
.card { background:#fff;padding:20px;border-radius:12px;}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#00c896;
  color:#fff;
}

button:disabled { background:#ccc; }

.toast {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#333;
  color:#fff;
  padding:12px 20px;
  border-radius:8px;
  display:none;
}

.loader {
  border:3px solid #fff;
  border-top:3px solid transparent;
  border-radius:50%;
  width:18px;
  height:18px;
  animation:spin 1s linear infinite;
  display:inline-block;
}

@keyframes spin {
  to { transform:rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h3>Email OTP Verification</h3>

<input type="email" id="email" placeholder="Enter your email">

<button id="sendOtp">Send OTP</button>

<input type="text" id="otp" placeholder="Enter OTP">
<button id="verifyOtp">Verify OTP</button>

<button id="continueBtn" disabled>Continue to Reset PIN</button>

</div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

const app = initializeApp({
  apiKey:"AIzaSyCQ8TCMUAySwLSBN3-0W1GV4XWateS1rqQ",
  authDomain:"zyppayx-69c54.firebaseapp.com",
  projectId:"zyppayx-69c54"
});

const sendBtn = document.getElementById("sendOtp");
const verifyBtn = document.getElementById("verifyOtp");
const continueBtn = document.getElementById("continueBtn");

let userEmail = "";
let otpVerified = false;

// toast
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",3000);
}

// SEND OTP (Cloud Function placeholder)
sendBtn.onclick = async () => {
  const email = document.getElementById("email").value;

  if(!email){
    toast("Enter email");
    return;
  }

  userEmail = email;

  sendBtn.innerHTML = "<span class='loader'></span>";

  try{
    // 🔥 THIS WILL BE CLOUD FUNCTION TOMORROW
    await fetch("https://YOUR_FUNCTION_URL/sendEmailOtp", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ email })
    });

    toast("OTP sent to email");
  }catch{
    toast("Failed to send OTP");
  }

  sendBtn.textContent = "Send OTP";
};

// VERIFY OTP (Cloud Function placeholder)
verifyBtn.onclick = async () => {
  const otp = document.getElementById("otp").value;

  if(!otp){
    toast("Enter OTP");
    return;
  }

  verifyBtn.innerHTML = "<span class='loader'></span>";

  try{
    // 🔥 CLOUD FUNCTION VERIFY
    const res = await fetch("https://YOUR_FUNCTION_URL/verifyEmailOtp", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ email:userEmail, otp })
    });

    const data = await res.json();

    if(data.success){
      otpVerified = true;
      continueBtn.disabled = false;
      toast("Verified ✅");
    }else{
      toast("Invalid OTP");
    }

  }catch{
    toast("Error verifying OTP");
  }

  verifyBtn.textContent = "Verify OTP";
};

// CONTINUE
continueBtn.onclick = () => {
  if(otpVerified){
    location.href = "changepin.html";
  }
};
</script>

</body>
</html>
