<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change PIN</title>

<style>
body { font-family: Arial; background:#f6f8fb; text-align:center; }

.container { max-width:400px;margin:auto;padding:20px;}
.card { background:#fff;padding:20px;border-radius:12px;}

.pin-box {
  display:flex;
  justify-content:space-between;
  margin:15px 0;
}
.pin-box div {
  width:50px;
  height:50px;
  border:2px solid #ccc;
  border-radius:10px;
  line-height:50px;
  font-size:20px;
}

.keypad {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.keypad button {
  padding:15px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#eee;
}

.toast {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#333;
  color:#fff;
  padding:12px 20px;
  border-radius:8px;
  display:none;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h3 id="title">Enter Old PIN</h3>

<div class="pin-box" id="pinBox"></div>

<div class="keypad" id="keypad"></div>

</div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCQ8TCMUAySwLSBN3-0W1GV4XWateS1rqQ",
  authDomain:"zyppayx-69c54.firebaseapp.com",
  projectId:"zyppayx-69c54"
});

const auth = getAuth(app);
const db = getFirestore(app);

let step = 1;
let oldPin = "";
let newPin = "";
let savedHash = "";
let input = "";

// toast
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",3000);
}

// hash
async function hashPin(pin){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pin));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

// UI PIN BOX
function renderPin(){
  const box = document.getElementById("pinBox");
  box.innerHTML="";
  for(let i=0;i<4;i++){
    const d = document.createElement("div");
    d.textContent = input[i] ? "●" : "";
    box.appendChild(d);
  }
}

// KEYPAD
function createKeypad(){
  const keys = [...Array(9).keys()].map(i=>i+1).concat(["",0,"⌫"]);
  const pad = document.getElementById("keypad");

  keys.forEach(k=>{
    const btn = document.createElement("button");
    btn.textContent = k;

    btn.onclick = async ()=>{
      if(k==="⌫"){
        input = input.slice(0,-1);
      } else if(k!==""){
        if(input.length<4) input+=k;
      }

      renderPin();

      if(input.length===4){
        await handlePin(input);
        input="";
        setTimeout(renderPin,100);
      }
    };

    pad.appendChild(btn);
  });
}

// HANDLE PIN STEPS
async function handlePin(pin){
  if(step===1){
    const hash = await hashPin(pin);
    if(hash!==savedHash){
      toast("Wrong Old PIN");
      return;
    }
    oldPin = pin;
    step=2;
    document.getElementById("title").textContent="Enter New PIN";
  }

  else if(step===2){
    newPin = pin;
    step=3;
    document.getElementById("title").textContent="Confirm New PIN";
  }

  else if(step===3){
    if(pin!==newPin){
      toast("PIN mismatch");
      return;
    }

    const newHash = await hashPin(newPin);

    await updateDoc(doc(db,"users",auth.currentUser.uid),{
      pinHash:newHash
    });

    toast("PIN Changed Successfully");
    setTimeout(()=>location.href="profile.html",1500);
  }
}

// LOAD USER
(async ()=>{
  const snap = await getDoc(doc(db,"users",auth.currentUser.uid));
  savedHash = snap.data().pinHash || "";
})();

createKeypad();
renderPin();
</script>

</body>
</html>
