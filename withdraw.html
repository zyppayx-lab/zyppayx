<!DOCTYPE html>
<html>
<head>
  <title>Withdraw</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding-top: 50px;
      background: #f5f6fa;
    }

    input, select {
      padding: 12px;
      width: 85%;
      margin: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .pin-box {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 10px;
    }

    .pin-box input {
      width: 50px;
      height: 50px;
      font-size: 20px;
      text-align: center;
    }

    button {
      padding: 12px;
      width: 85%;
      background: #0a0f2c;
      color: white;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h2>Withdraw Money</h2>

<input type="number" id="amount" placeholder="Enter amount">

<!-- ✅ BANK LIST -->
<select id="bank">
  <option value="">Select Bank</option>
  <option value="044">Access Bank</option>
  <option value="014">Afribank</option>
  <option value="023">Citibank</option>
  <option value="050">Ecobank</option>
  <option value="070">Fidelity Bank</option>
  <option value="011">First Bank</option>
  <option value="214">First City Monument Bank</option>
  <option value="058">Guaranty Trust Bank</option>
  <option value="030">Heritage Bank</option>
  <option value="301">Jaiz Bank</option>
  <option value="082">Keystone Bank</option>
  <option value="526">Parallex Bank</option>
  <option value="076">Polaris Bank</option>
  <option value="101">Providus Bank</option>
  <option value="221">Stanbic IBTC</option>
  <option value="068">Standard Chartered</option>
  <option value="232">Sterling Bank</option>
  <option value="100">Suntrust Bank</option>
  <option value="032">Union Bank</option>
  <option value="033">UBA</option>
  <option value="215">Unity Bank</option>
  <option value="035">Wema Bank</option>
  <option value="057">Zenith Bank</option>
  <option value="090267">Kuda Bank</option>
  <option value="090110">VFD Bank</option>
  <option value="090405">Moniepoint</option>
  <option value="100004">Opay</option>
  <option value="100033">PalmPay</option>
</select>

<input type="number" id="account" placeholder="Account Number">

<!-- PIN -->
<div class="pin-box">
  <input maxlength="1" id="p1">
  <input maxlength="1" id="p2">
  <input maxlength="1" id="p3">
  <input maxlength="1" id="p4">
</div>

<button onclick="withdraw()">Withdraw</button>

<script>
const API = "https://zyppayxvest-backend.onrender.com";
const email = localStorage.getItem("email");

function getPin() {
  return p1.value + p2.value + p3.value + p4.value;
}

async function withdraw() {
  const amount = document.getElementById("amount").value;
  const bank = document.getElementById("bank").value;
  const account = document.getElementById("account").value;
  const pin = getPin();

  if (!bank || !account || !amount || pin.length !== 4) {
    alert("Fill all fields correctly");
    return;
  }

  const res = await fetch(`${API}/withdraw`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email,
      amount: Number(amount),
      pin
    })
  });

  const data = await res.json();

  alert(data.message || data.detail);
}
</script>

</body>
    </html>
