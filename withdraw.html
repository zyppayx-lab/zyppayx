<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyppayxvest | Withdraw</title>

<style>
body { margin:0; font-family: Arial; background:#f6f8fb;}
header { background:#0a1f44;color:#fff;padding:20px;text-align:center;}
.container { max-width:600px;margin:auto;padding:15px;}
.card { background:#fff;padding:18px;border-radius:12px;margin-bottom:20px;}

input, select {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  margin-top:15px;
  padding:12px;
  background:#00c896;
  color:#fff;
  border:none;
  border-radius:8px;
  width:100%;
  font-weight:bold;
}

.success { color:green; }
.error { color:red; }

/* 🔐 PIN UI */
.pin-display {
  display:flex;
  justify-content:center;
  gap:10px;
  margin:15px 0;
}

.pin-dot {
  width:15px;
  height:15px;
  border-radius:50%;
  border:2px solid #333;
}

.pin-dot.filled {
  background:#333;
}

.keypad {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.keypad button {
  padding:15px;
  font-size:18px;
  border-radius:10px;
  background:#eaeaea;
  color:#000;
}

.keypad button:active {
  background:#ccc;
}
</style>
</head>

<body>

<header>Request Withdrawal</header>

<div class="container">

<div class="card">
<h3>Your Wallet Balance</h3>
<p>₦<span id="balance">0</span></p>
</div>

<div class="card">
<h3>Withdrawal Form</h3>

<input type="number" id="amount" placeholder="Enter amount">
<p id="feeInfo"></p>

<!-- 🏦 FULL NIGERIA BANKS -->
<select id="bankName">
<option value="">Select Bank</option>

<option>Access Bank</option>
<option>Citibank Nigeria</option>
<option>Ecobank Nigeria</option>
<option>Fidelity Bank</option>
<option>First Bank of Nigeria</option>
<option>First City Monument Bank (FCMB)</option>
<option>Globus Bank</option>
<option>Guaranty Trust Bank (GTBank)</option>
<option>Heritage Bank</option>
<option>Keystone Bank</option>
<option>Polaris Bank</option>
<option>Providus Bank</option>
<option>Stanbic IBTC Bank</option>
<option>Standard Chartered Bank Nigeria</option>
<option>Sterling Bank</option>
<option>SunTrust Bank Nigeria</option>
<option>Titan Trust Bank</option>
<option>Union Bank of Nigeria</option>
<option>United Bank for Africa (UBA)</option>
<option>Unity Bank</option>
<option>Wema Bank</option>
<option>Zenith Bank</option>

<option>Opay</option>
<option>Palmpay</option>
<option>Kuda Bank</option>
<option>Moniepoint MFB</option>
<option>VFD Microfinance Bank</option>
<option>Rubies MFB</option>
<option>Eyowo</option>
</select>

<input type="text" id="accountName" placeholder="Account Name">
<input type="text" id="accountNumber" placeholder="Account Number">

<!-- 🔐 PIN DISPLAY -->
<div class="pin-display">
  <div class="pin-dot" id="d1"></div>
  <div class="pin-dot" id="d2"></div>
  <div class="pin-dot" id="d3"></div>
  <div class="pin-dot" id="d4"></div>
</div>

<!-- 🔢 KEYPAD -->
<div class="keypad">
  <button onclick="press(1)">1</button>
  <button onclick="press(2)">2</button>
  <button onclick="press(3)">3</button>
  <button onclick="press(4)">4</button>
  <button onclick="press(5)">5</button>
  <button onclick="press(6)">6</button>
  <button onclick="press(7)">7</button>
  <button onclick="press(8)">8</button>
  <button onclick="press(9)">9</button>
  <button onclick="clearPin()">⌫</button>
  <button onclick="press(0)">0</button>
  <button onclick="clearAll()">C</button>
</div>

<button id="withdrawBtn" disabled>Request Withdrawal</button>
<p id="message"></p>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-functions.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const functions = getFunctions(app);

const withdrawFn = httpsCallable(functions, "requestWithdrawal");

let pinValue = "";

const dots = [
  document.getElementById("d1"),
  document.getElementById("d2"),
  document.getElementById("d3"),
  document.getElementById("d4")
];

const withdrawBtn = document.getElementById("withdrawBtn");
const msg = document.getElementById("message");

/* 🔐 PIN SYSTEM */
window.press = (num) => {
  if (pinValue.length >= 4) return;
  pinValue += num;
  updateDots();
  if (pinValue.length === 4) withdrawBtn.disabled = false;
};

window.clearPin = () => {
  pinValue = pinValue.slice(0, -1);
  updateDots();
  withdrawBtn.disabled = true;
};

window.clearAll = () => {
  pinValue = "";
  updateDots();
  withdrawBtn.disabled = true;
};

function updateDots() {
  dots.forEach((dot, i) => {
    dot.classList.toggle("filled", i < pinValue.length);
  });
}

/* LOAD USER */
onAuthStateChanged(auth, async (user) => {
  if (!user) return location.href = "login.html";

  const snap = await getDoc(doc(db, "users", user.uid));
  if (snap.exists()) {
    document.getElementById("balance").textContent =
      snap.data().balance || 0;
  }
});

/* 🚀 WITHDRAW */
withdrawBtn.onclick = async () => {

  const amount = parseInt(document.getElementById("amount").value);
  const bankName = document.getElementById("bankName").value;
  const accountName = document.getElementById("accountName").value.trim();
  const accountNumber = document.getElementById("accountNumber").value.trim();

  if (!amount || amount < 1000) {
    msg.textContent = "Minimum ₦1000";
    msg.className = "error";
    return;
  }

  if (!bankName || !accountName || !accountNumber) {
    msg.textContent = "Complete all fields";
    msg.className = "error";
    return;
  }

  try {
    withdrawBtn.disabled = true;

    const res = await withdrawFn({
      amount,
      pin: pinValue,
      bankName,
      accountName,
      accountNumber
    });

    msg.textContent = res.data.message;
    msg.className = "success";

    clearAll();

  } catch (err) {
    msg.textContent = err.message;
    msg.className = "error";
    withdrawBtn.disabled = false;
  }
};
</script>

</body>
</html>
