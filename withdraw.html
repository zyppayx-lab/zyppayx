<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyppayxvest | Withdraw</title>

<style>
body { margin:0; font-family: Arial; background:#f6f8fb;}
header { background:#0a1f44;color:#fff;padding:20px;text-align:center;}

.container { max-width:600px;margin:auto;padding:15px;}

.card { background:#fff;padding:18px;border-radius:12px;margin-bottom:20px;}

input, select {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  margin-top:15px;
  padding:12px;
  background:#00c896;
  color:#fff;
  border:none;
  border-radius:8px;
  width:100%;
  font-weight:bold;
}

.pin-box {
  display:flex;
  justify-content:space-between;
  margin-top:15px;
}
.pin-digit {
  width:50px;height:50px;
  border:2px solid #ccc;
  border-radius:10px;
  text-align:center;
  line-height:50px;
  font-size:20px;
}

.keypad {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:15px;
}
.key {
  padding:15px;
  background:#eee;
  text-align:center;
  border-radius:10px;
  font-size:18px;
}

.link {
  text-align:center;
  margin-top:10px;
}
.link a {
  color:#0a1f44;
  text-decoration:none;
  font-weight:bold;
}

.success { color:green; }
.error { color:red; }
</style>
</head>

<body>

<header>Request Withdrawal</header>

<div class="container">

<div class="card">
<h3>Your Wallet Balance</h3>
<p>₦<span id="balance">0</span></p>
</div>

<div class="card">
<h3>Withdrawal Form</h3>

<input type="number" id="amount" placeholder="Enter amount">
<p id="feeInfo"></p>

<select id="bankName">
<option value="">Select Bank</option>
<option>Access Bank</option>
<option>GTBank</option>
<option>Zenith Bank</option>
<option>First Bank</option>
<option>UBA</option>
<option>Fidelity Bank</option>
<option>Union Bank</option>
<option>Sterling Bank</option>
<option>Wema Bank</option>
<option>Polaris Bank</option>
<option>Stanbic IBTC</option>
<option>FCMB</option>
<option>Ecobank</option>
<option>Kuda Bank</option>
<option>Opay</option>
<option>Palmpay</option>
<option>Moniepoint MFB</option>
<option>Jaiz Bank</option>
<option>Keystone Bank</option>
<option>Titan Trust Bank</option>
</select>

<input type="text" id="accountName" placeholder="Account Name">
<input type="text" id="accountNumber" placeholder="Account Number">

<!-- PIN DISPLAY -->
<div class="pin-box">
<div class="pin-digit" id="d1"></div>
<div class="pin-digit" id="d2"></div>
<div class="pin-digit" id="d3"></div>
<div class="pin-digit" id="d4"></div>
</div>

<!-- KEYPAD -->
<div class="keypad" id="keypad"></div>

<button id="withdrawBtn" disabled>Request Withdrawal</button>
<p id="message"></p>

<div class="link">
<a href="withdrawal-history.html">View Withdrawal History</a>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-functions.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCQ8TCMUAySwLSBN3-0W1GV4XWateS1rqQ",
  authDomain: "zyppayx-69c54.firebaseapp.com",
  projectId: "zyppayx-69c54",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const functions = getFunctions(app);

let pin = "";
let currentUser = null;

// KEYPAD SETUP
const keypad = document.getElementById("keypad");
[1,2,3,4,5,6,7,8,9,"",0,"⌫"].forEach(k => {
  const div = document.createElement("div");
  div.className = "key";
  div.textContent = k;
  div.onclick = () => pressKey(k);
  keypad.appendChild(div);
});

function pressKey(key){
  if(key==="⌫"){
    pin = pin.slice(0,-1);
  } else if(pin.length<4 && key!==""){
    pin += key;
  }
  renderPin();
}

function renderPin(){
  for(let i=1;i<=4;i++){
    document.getElementById("d"+i).textContent = pin[i-1] ? "•" : "";
  }
  document.getElementById("withdrawBtn").disabled = pin.length !== 4;
}

// LOAD USER
onAuthStateChanged(auth, async user => {
  if(!user) return location.href="login.html";
  currentUser = user;

  const snap = await getDoc(doc(db,"users",user.uid));
  document.getElementById("balance").textContent = snap.data().balance || 0;
});

// WITHDRAW VIA CLOUD FUNCTION
document.getElementById("withdrawBtn").onclick = async () => {
  const msg = document.getElementById("message");

  try{
    const withdraw = httpsCallable(functions,"requestWithdrawal");

    const res = await withdraw({
      amount: Number(document.getElementById("amount").value),
      bankName: document.getElementById("bankName").value,
      accountName: document.getElementById("accountName").value,
      accountNumber: document.getElementById("accountNumber").value,
      pin: pin
    });

    msg.textContent = res.data.message;
    msg.className = "success";
    pin="";
    renderPin();

  }catch(err){
    msg.textContent = err.message;
    msg.className = "error";
  }
};
</script>

</body>
</html>
