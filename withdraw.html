<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyppayxvest | Withdraw</title>

<style>
body { margin:0; font-family: Arial; background:#f6f8fb;}
header { background:#0a1f44;color:#fff;padding:20px;text-align:center;}
.container { max-width:600px;margin:auto;padding:15px;}
.card { background:#fff;padding:18px;border-radius:12px;margin-bottom:20px;}
input, select {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}
button {
  margin-top:15px;
  padding:12px;
  background:#00c896;
  color:#fff;
  border:none;
  border-radius:8px;
  width:100%;
  font-weight:bold;
}
.success { color:green; }
.error { color:red; }
</style>
</head>

<body>

<header>Request Withdrawal</header>

<div class="container">

<div class="card">
<h3>Your Wallet Balance</h3>
<p>₦<span id="balance">0</span></p>
</div>

<div class="card">
<h3>Withdrawal Form</h3>

<input type="number" id="amount" placeholder="Enter amount">
<p id="feeInfo"></p>

<select id="bankName">
<option value="">Select Bank</option>
<option>Access Bank</option>
<option>GTBank</option>
<option>Zenith Bank</option>
<option>First Bank</option>
<option>UBA</option>
<option>Fidelity Bank</option>
<option>Union Bank</option>
<option>Sterling Bank</option>
<option>Wema Bank</option>
<option>Polaris Bank</option>
<option>Stanbic IBTC</option>
<option>FCMB</option>
<option>Ecobank</option>
<option>Kuda Bank</option>
<option>Opay</option>
<option>Palmpay</option>
<option>Moniepoint MFB</option>
</select>

<input type="text" id="accountName" placeholder="Account Name">
<input type="text" id="accountNumber" placeholder="Account Number">
<input type="password" id="pin" maxlength="4" placeholder="Enter 4-digit PIN">

<button id="withdrawBtn" disabled>Request Withdrawal</button>
<p id="message"></p>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore,
  doc,
  getDoc,
  updateDoc,
  collection,
  addDoc,
  serverTimestamp,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCQ8TCMUAySwLSBN3-0W1GV4XWateS1rqQ",
  authDomain: "zyppayx-69c54.firebaseapp.com",
  projectId: "zyppayx-69c54",
  storageBucket: "zyppayx-69c54.appspot.com",
  messagingSenderId: "439535581166",
  appId: "1:439535581166:web:994d1c9f75bd1294ef00ff"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUserId = "";
let currentBalance = 0;
let savedPinHash = "";
let userTier = 1;
let failedAttempts = 0;
let lockUntil = 0;

const feePercent = 0.05;

const pinInput = document.getElementById("pin");
const withdrawBtn = document.getElementById("withdrawBtn");
const msg = document.getElementById("message");

// HASH PIN
async function hashPin(pin) {
  const encoder = new TextEncoder();
  const data = encoder.encode(pin);
  const hashBuffer = await crypto.subtle.digest("SHA-256", data);
  return Array.from(new Uint8Array(hashBuffer))
    .map(b => b.toString(16).padStart(2, "0"))
    .join("");
}

// ENABLE BUTTON WHEN PIN IS 4 DIGITS
pinInput.addEventListener("input", () => {
  withdrawBtn.disabled = pinInput.value.length !== 4;
});

// LOAD USER DATA
onAuthStateChanged(auth, async (user) => {
  if (!user) return location.href = "login.html";

  currentUserId = user.uid;

  const snap = await getDoc(doc(db, "users", user.uid));
  if (snap.exists()) {
    const data = snap.data();
    currentBalance = data.balance || 0;
    savedPinHash = data.pinHash || "";
    userTier = data.tier || 1;
    failedAttempts = data.failedAttempts || 0;
    lockUntil = data.lockUntil || 0;

    document.getElementById("balance").textContent = currentBalance;
  }
});

// LIVE FEE DISPLAY
document.getElementById("amount").addEventListener("input", () => {
  const amt = parseInt(document.getElementById("amount").value) || 0;

  if (amt > 0) {
    const fee = Math.floor(amt * feePercent);
    const receive = amt - fee;

    document.getElementById("feeInfo").textContent =
      `Fee: ₦${fee} | You receive: ₦${receive}`;
  } else {
    document.getElementById("feeInfo").textContent = "";
  }
});

// WITHDRAW FUNCTION
withdrawBtn.onclick = async () => {

  const now = Date.now();

  // 🔐 CHECK LOCK (SERVER SIDE)
  if (now < lockUntil) {
    const remaining = Math.ceil((lockUntil - now) / 1000);
    msg.textContent = `Locked. Try again in ${remaining}s`;
    msg.className = "error";
    return;
  }

  const pin = pinInput.value;

  if (!pin || pin.length !== 4) {
    msg.textContent = "Enter PIN first";
    msg.className = "error";
    return;
  }

  const hashedInput = await hashPin(pin);

  // ❌ WRONG PIN
  if (hashedInput !== savedPinHash) {
    failedAttempts++;

    let updateData = { failedAttempts };

    if (failedAttempts >= 3) {
      updateData.lockUntil = now + 30000;
      msg.textContent = "Too many attempts. Locked 30s";
    } else {
      msg.textContent = `Wrong PIN (${failedAttempts}/3)`;
    }

    msg.className = "error";
    await updateDoc(doc(db, "users", currentUserId), updateData);
    return;
  }

  // ✅ RESET SECURITY
  await updateDoc(doc(db, "users", currentUserId), {
    failedAttempts: 0,
    lockUntil: 0
  });

  const rawAmount = parseInt(document.getElementById("amount").value);
  const fee = Math.floor(rawAmount * feePercent);
  const amountToReceive = rawAmount - fee;

  const bankName = document.getElementById("bankName").value;
  const accountName = document.getElementById("accountName").value.trim();
  const accountNumber = document.getElementById("accountNumber").value.trim();

  if (!rawAmount || rawAmount < 1000) {
    msg.textContent = "Minimum ₦1000";
    msg.className = "error";
    return;
  }

  if (rawAmount > currentBalance) {
    msg.textContent = "Insufficient balance";
    msg.className = "error";
    return;
  }

  let maxLimit = 50000;
  if (userTier == 2) maxLimit = 200000;
  if (userTier == 3) maxLimit = Infinity;

  if (rawAmount > maxLimit) {
    msg.textContent = `Limit ₦${maxLimit}`;
    msg.className = "error";
    return;
  }

  const q = query(
    collection(db, "withdrawals"),
    where("userId", "==", currentUserId),
    where("status", "==", "pending")
  );

  const pendingSnap = await getDocs(q);
  if (!pendingSnap.empty) {
    msg.textContent = "Pending withdrawal exists";
    msg.className = "error";
    return;
  }

  try {
    await addDoc(collection(db, "withdrawals"), {
      userId: currentUserId,
      amount: rawAmount,
      fee,
      amountToReceive,
      bankName,
      accountName,
      accountNumber,
      status: "pending",
      createdAt: serverTimestamp()
    });

    msg.textContent = "Withdrawal submitted";
    msg.className = "success";

    // CLEAR FORM
    document.getElementById("amount").value = "";
    document.getElementById("accountName").value = "";
    document.getElementById("accountNumber").value = "";
    pinInput.value = "";
    withdrawBtn.disabled = true;

  } catch (err) {
    msg.textContent = "Error occurred";
    msg.className = "error";
  }
};
</script>

</body>
  </html>
