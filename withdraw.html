<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyppayxvest | Withdraw</title>

<style>
body { margin:0; font-family: Arial; background:#f6f8fb;}
header { background:#0a1f44;color:#fff;padding:20px;text-align:center;}
.container { max-width:600px;margin:auto;padding:15px;}

.card {
  background:#fff;
  padding:18px;
  border-radius:12px;
  margin-bottom:20px;
}

input, select {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  margin-top:15px;
  padding:12px;
  background:#00c896;
  color:#fff;
  border:none;
  border-radius:8px;
  width:100%;
  font-weight:bold;
}

.success { color:green; }
.error { color:red; }
</style>
</head>

<body>

<header>Request Withdrawal</header>

<div class="container">

<div class="card">
<h3>Your Wallet Balance</h3>
<p>₦<span id="balance">0</span></p>
</div>

<div class="card">
<h3>Withdrawal Form</h3>

<input type="number" id="amount" placeholder="Enter amount">
<p id="feeInfo"></p>

<select id="bankName">
<option value="">Select Bank</option>
<option>Access Bank</option>
<option>GTBank</option>
<option>Zenith Bank</option>
<option>First Bank</option>
<option>UBA</option>
<option>Fidelity Bank</option>
<option>Union Bank</option>
<option>Sterling Bank</option>
<option>Wema Bank</option>
<option>Polaris Bank</option>
<option>Stanbic IBTC</option>
<option>FCMB</option>
<option>Ecobank</option>
<option>Kuda Bank</option>
<option>Opay</option>
<option>Palmpay</option>
<option>Moniepoint MFB</option>
</select>

<input type="text" id="accountName" placeholder="Account Name">
<input type="text" id="accountNumber" placeholder="Account Number">
<input type="password" id="pin" maxlength="4" placeholder="Enter 4-digit PIN">

<button id="withdrawBtn">Request Withdrawal</button>
<p id="message"></p>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore,
  doc,
  getDoc,
  collection,
  addDoc,
  serverTimestamp,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCQ8TCMUAySwLSBN3-0W1GV4XWateS1rqQ",
  authDomain: "zyppayx-69c54.firebaseapp.com",
  projectId: "zyppayx-69c54",
  storageBucket: "zyppayx-69c54.appspot.com",
  messagingSenderId: "439535581166",
  appId: "1:439535581166:web:994d1c9f75bd1294ef00ff"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUserId = "";
let currentBalance = 0;
let savedPinHash = "";
let userTier = 1;

const feePercent = 0.05;

// HASH PIN
async function hashPin(pin) {
  const encoder = new TextEncoder();
  const data = encoder.encode(pin);
  const hashBuffer = await crypto.subtle.digest("SHA-256", data);
  return Array.from(new Uint8Array(hashBuffer))
    .map(b => b.toString(16).padStart(2, "0"))
    .join("");
}

// LOAD USER
onAuthStateChanged(auth, async (user) => {
  if (!user) return location.href = "login.html";

  currentUserId = user.uid;

  const snap = await getDoc(doc(db, "users", user.uid));
  if (snap.exists()) {
    const data = snap.data();
    currentBalance = data.balance || 0;
    savedPinHash = data.pinHash || "";
    userTier = data.tier || 1;

    document.getElementById("balance").textContent = currentBalance;
  }
});

// LIVE FEE
document.getElementById("amount").addEventListener("input", () => {
  const amt = parseInt(document.getElementById("amount").value) || 0;

  if (amt > 0) {
    const fee = Math.floor(amt * feePercent);
    const receive = amt - fee;

    document.getElementById("feeInfo").textContent =
      `Fee: ₦${fee} | You receive: ₦${receive}`;
  } else {
    document.getElementById("feeInfo").textContent = "";
  }
});

// WITHDRAW
document.getElementById("withdrawBtn").onclick = async () => {
  const rawAmount = parseInt(document.getElementById("amount").value);
  const fee = Math.floor(rawAmount * feePercent);
  const amountToReceive = rawAmount - fee;

  const bankName = document.getElementById("bankName").value;
  const accountName = document.getElementById("accountName").value.trim();
  const accountNumber = document.getElementById("accountNumber").value.trim();
  const pin = document.getElementById("pin").value;

  const msg = document.getElementById("message");
  msg.textContent = "";
  msg.className = "";

  if (!rawAmount || rawAmount < 1000) {
    msg.textContent = "Minimum withdrawal is ₦1000";
    msg.className = "error";
    return;
  }

  if (rawAmount > currentBalance) {
    msg.textContent = "Insufficient balance";
    msg.className = "error";
    return;
  }

  let maxLimit = 50000;
  if (userTier == 2) maxLimit = 200000;
  if (userTier == 3) maxLimit = Infinity;

  if (rawAmount > maxLimit) {
    msg.textContent = `Your tier limit is ₦${maxLimit}`;
    msg.className = "error";
    return;
  }

  const q = query(
    collection(db, "withdrawals"),
    where("userId", "==", currentUserId),
    where("status", "==", "pending")
  );

  const pendingSnap = await getDocs(q);
  if (!pendingSnap.empty) {
    msg.textContent = "You already have a pending withdrawal";
    msg.className = "error";
    return;
  }

  const hashedInput = await hashPin(pin);
  if (hashedInput !== savedPinHash) {
    msg.textContent = "Incorrect PIN";
    msg.className = "error";
    return;
  }

  try {
    await addDoc(collection(db, "withdrawals"), {
      userId: currentUserId,
      amount: rawAmount,
      fee: fee,
      amountToReceive: amountToReceive,
      bankName,
      accountName,
      accountNumber,
      status: "pending",
      createdAt: serverTimestamp()
    });

    msg.textContent = "Withdrawal submitted";
    msg.className = "success";

  } catch (err) {
    msg.textContent = "Error occurred";
    msg.className = "error";
  }
};
</script>

</body>
</html>
