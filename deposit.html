<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyppayxvest | Deposit</title>

<style>
body { margin:0; font-family: Arial; background:#f6f8fb;}

header {
  background:#0a1f44;
  color:#fff;
  padding:20px;
  text-align:center;
}

.container {
  max-width:600px;
  margin:auto;
  padding:15px;
}

.card {
  background:#fff;
  padding:18px;
  border-radius:12px;
  margin-bottom:20px;
}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  margin-top:15px;
  padding:12px;
  background:#00c896;
  color:#fff;
  border:none;
  border-radius:8px;
  width:100%;
  font-weight:bold;
}

.quick {
  display:flex;
  gap:10px;
  margin-top:10px;
}

.quick button {
  flex:1;
  background:#eee;
  color:#000;
}

.success { color:green; }
.error { color:red; }

.link {
  text-align:center;
  margin-top:10px;
}
.link a {
  text-decoration:none;
  color:#0a1f44;
  font-weight:bold;
}
</style>
</head>

<body>

<header>Fund Wallet</header>

<div class="container">

<div class="card">
<h3>Your Balance</h3>
<p>₦<span id="balance">0</span></p>
</div>

<div class="card">
<h3>Deposit Amount</h3>

<input type="number" id="amount" placeholder="Enter amount">

<div class="quick">
<button onclick="setAmount(1000)">₦1,000</button>
<button onclick="setAmount(5000)">₦5,000</button>
<button onclick="setAmount(10000)">₦10,000</button>
</div>

<button id="depositBtn">Proceed to Pay</button>
<p id="message"></p>

<div class="link">
<a href="withdraw.html">Go to Withdraw</a>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-functions.js";

const firebaseConfig = {
  apiKey: "AIzaSyCQ8TCMUAySwLSBN3-0W1GV4XWateS1rqQ",
  authDomain: "zyppayx-69c54.firebaseapp.com",
  projectId: "zyppayx-69c54",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const functions = getFunctions(app);

let currentUser = null;

// QUICK AMOUNT BUTTON
window.setAmount = (amt) => {
  document.getElementById("amount").value = amt;
};

// LOAD USER BALANCE
onAuthStateChanged(auth, async (user) => {
  if (!user) return location.href="login.html";

  currentUser = user;

  const snap = await getDoc(doc(db,"users",user.uid));
  document.getElementById("balance").textContent = snap.data().balance || 0;
});

// 🔥 PKLIVE READY DEPOSIT
document.getElementById("depositBtn").onclick = async () => {

  const msg = document.getElementById("message");
  const amount = Number(document.getElementById("amount").value);

  if (!amount || amount < 100) {
    msg.textContent = "Minimum deposit is ₦100";
    msg.className = "error";
    return;
  }

  try {
    const deposit = httpsCallable(functions, "initializeDeposit");

    const res = await deposit({
      amount: amount,
      email: auth.currentUser.email
    });

    // 🔁 REDIRECT TO PAYSTACK
    window.location.href = res.data.authorization_url;

  } catch (err) {
    msg.textContent = err.message;
    msg.className = "error";
  }
};
</script>

</body>
</html>
