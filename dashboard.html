<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyppayxvest | Dashboard</title>

<style>
body { margin:0; font-family: Arial; background:#f6f8fb;}

header {
  background:#0a1f44;
  color:#fff;
  padding:20px;
  text-align:center;
}

.hero {
  background:#102f66;
  color:#fff;
  text-align:center;
  padding:25px;
  border-radius:0 0 20px 20px;
}

.container { padding:15px; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
  margin-top:15px;
}

.card {
  background:#fff;
  padding:15px;
  border-radius:12px;
  text-align:center;
}

.actions {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
  margin-top:20px;
}

button {
  padding:12px;
  border:none;
  border-radius:8px;
  background:#00c896;
  color:#fff;
  font-weight:bold;
}

.badge {
  display:inline-block;
  padding:5px 12px;
  border-radius:20px;
  margin-top:10px;
  font-size:12px;
}

.tier1 { background:#ccc; }
.tier2 { background:#00c896; color:#fff; }
.tier3 { background:#f39c12; color:#fff; }

ul {
  list-style:none;
  padding:0;
}

li {
  background:#fff;
  padding:10px;
  border-radius:8px;
  margin-top:8px;
}
</style>
</head>

<body>

<header>Zyppayxvest Dashboard</header>

<div class="hero">
  <h2>Welcome, <span id="userName">User</span></h2>
  <p>Wallet Balance: ₦<span id="balance">0</span></p>
  <div id="tierBadge" class="badge tier1">Tier 1</div>
</div>

<div class="container">

<div class="grid">
  <div class="card">
    <h4>Total Earnings</h4>
    ₦<span id="earnings">0</span>
  </div>

  <div class="card">
    <h4>Referral Bonus</h4>
    ₦<span id="refBonus">0</span>
  </div>

  <div class="card">
    <h4>Total Referrals</h4>
    <span id="refCount">0</span>
  </div>

  <div class="card">
    <h4>Active Investment</h4>
    ₦<span id="activeInv">0</span>
  </div>
</div>

<div class="actions">
  <button onclick="go('invest.html')">Invest</button>
  <button onclick="go('withdraw.html')">Withdraw</button>
  <button onclick="go('refer.html')">Refer</button>
  <button onclick="go('withdrawal-history.html')">History</button>
  <button onclick="go('verify.html')">Verify Account</button>
</div>

<h3>Recent Activity</h3>
<ul id="activities">
  <li>No activity yet</li>
</ul>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore,
  doc,
  onSnapshot,
  collection,
  query,
  orderBy,
  limit
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCQ8TCMUAySwLSBN3-0W1GV4XWateS1rqQ",
  authDomain: "zyppayx-69c54.firebaseapp.com",
  projectId: "zyppayx-69c54"
});

const auth = getAuth(app);
const db = getFirestore(app);

window.go = (url) => window.location.href = url;

onAuthStateChanged(auth, (user) => {
  if (!user) return location.href = "login.html";

  const userRef = doc(db, "users", user.uid);

  // ✅ USER REAL-TIME DATA
  onSnapshot(userRef, (snap) => {
    if (!snap.exists()) return;

    const d = snap.data();

    document.getElementById("userName").textContent = d.fullName || "User";
    document.getElementById("balance").textContent = d.balance || 0;
    document.getElementById("earnings").textContent = d.totalEarnings || 0;
    document.getElementById("refBonus").textContent = d.referralBonus || 0;
    document.getElementById("refCount").textContent = d.referrals || 0;
    document.getElementById("activeInv").textContent = d.activeInvestment || 0;

    // ✅ TIER SYSTEM (AUTO UPDATE FROM CLOUD FUNCTION)
    const tier = d.tier || 1;
    const badge = document.getElementById("tierBadge");

    badge.textContent = "Tier " + tier;
    badge.className = "badge tier" + tier;
  });

  // ✅ ACTIVITIES
  const q = query(
    collection(db, "users", user.uid, "activities"),
    orderBy("createdAt", "desc"),
    limit(5)
  );

  onSnapshot(q, (snap) => {
    const list = document.getElementById("activities");
    list.innerHTML = "";

    if (snap.empty) {
      list.innerHTML = "<li>No activity yet</li>";
      return;
    }

    snap.forEach(doc => {
      const li = document.createElement("li");
      li.textContent = doc.data().message;
      list.appendChild(li);
    });
  });

});
</script>

</body>
</html>
