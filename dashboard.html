<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyppayxvest | Dashboard</title>

<style>
body { margin:0; font-family: Arial; background:#f6f8fb;}

header {
  background:#0a1f44;
  color:#fff;
  padding:20px;
  text-align:center;
}

.hero {
  background:#102f66;
  color:#fff;
  text-align:center;
  padding:25px;
  border-radius:0 0 20px 20px;
}

.container { padding:15px; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
  margin-top:15px;
}

.card {
  background:#fff;
  padding:15px;
  border-radius:12px;
  text-align:center;
}

.actions {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
  margin-top:20px;
}

button {
  padding:12px;
  border:none;
  border-radius:8px;
  background:#00c896;
  color:#fff;
  font-weight:bold;
}

.badge {
  display:inline-block;
  padding:5px 12px;
  border-radius:20px;
  margin-top:10px;
  font-size:12px;
}

.tier1 { background:#ccc; }
.tier2 { background:#00c896; color:#fff; }
.tier3 { background:#f39c12; color:#fff; }

ul {
  list-style:none;
  padding:0;
}

li {
  background:#fff;
  padding:10px;
  border-radius:8px;
  margin-top:8px;
}
</style>
</head>

<body>

<header>Zyppayxvest Dashboard</header>

<div class="hero">
  <h2>Welcome, <span id="userName">User</span></h2>
  <p>Wallet Balance: ₦<span id="balance">0</span></p>
  <div id="tierBadge" class="badge tier1">Tier 1</div>
</div>

<div class="container">

<div class="grid">
  <div class="card">
    <h4>Total Earnings</h4>
    ₦<span id="earnings">0</span>
  </div>

  <div class="card">
    <h4>Referral Bonus</h4>
    ₦<span id="refBonus">0</span>
  </div>

  <div class="card">
    <h4>Total Referrals</h4>
    <span id="refCount">0</span>
  </div>

  <div class="card">
    <h4>Active Investment</h4>
    ₦<span id="activeInv">0</span>
  </div>
</div>

<div class="actions">
  <button onclick="go('invest.html')">Invest</button>
  <button onclick="go('withdraw.html')">Withdraw</button>
  <button onclick="go('refer.html')">Refer</button>
  <button onclick="go('withdrawal-history.html')">History</button>
  <button onclick="go('verify.html')">Verify Account</button>
</div>

<h3>Recent Activity</h3>
<ul id="activities">
  <li>No activity yet</li>
</ul>

</div>

<script>
const API = "https://zyppayxvest-backend.onrender.com";

window.go = (url) => window.location.href = url;

// GET USER FROM LOGIN
const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
  window.location.href = "login.html";
}

// SET BASIC DATA
document.getElementById("userName").textContent = user.full_name;
document.getElementById("balance").textContent = user.balance;

// OPTIONAL (placeholders until backend expands)
document.getElementById("earnings").textContent = 0;
document.getElementById("refBonus").textContent = 0;
document.getElementById("refCount").textContent = 0;
document.getElementById("activeInv").textContent = 0;

// SIMPLE TIER LOGIC (temporary)
let tier = 1;
if (user.balance > 1000) tier = 2;
if (user.balance > 5000) tier = 3;

const badge = document.getElementById("tierBadge");
badge.textContent = "Tier " + tier;
badge.className = "badge tier" + tier;

// TEMP ACTIVITIES
const activities = document.getElementById("activities");
activities.innerHTML = `
  <li>Welcome to Zyppayxvest 🎉</li>
  <li>Your account is ready</li>
`;
</script>

</body>
</html>
