<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f6fa;
      margin: 0;
    }

    .header {
      background: #0a0f2c;
      color: white;
      padding: 20px;
    }

    .balance {
      font-size: 28px;
      margin-top: 10px;
    }

    .actions {
      display: flex;
      justify-content: space-around;
      margin: 20px;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #0a0f2c;
      color: white;
      cursor: pointer;
    }

    .history-btn {
      margin: 20px;
      width: 90%;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 10px;
      border-top: 1px solid #ccc;
    }
  </style>
</head>

<body>

<div class="header">
  <h2 id="name">Welcome</h2>
  <div class="balance" id="balance">₦0</div>
</div>

<div class="actions">
  <button onclick="deposit()">Deposit</button>
  <button onclick="withdraw()">Withdraw</button>
</div>

<button class="history-btn" onclick="goHistory()">
  📊 Transaction History
</button>

<div class="bottom-nav">
  <div>Home</div>
  <div>Invest</div>
  <div>Alerts</div>
  <div>Profile</div>
</div>

<script>
const API = "https://zyppayxvest-backend.onrender.com";

const email = localStorage.getItem("email");

async function loadUser() {
  const res = await fetch(`${API}/user/${email}`);
  const data = await res.json();

  document.getElementById("name").innerText = data.full_name;
  document.getElementById("balance").innerText = "₦" + data.balance;
}

function deposit() {
  window.location.href = "deposit.html";
}

function goHistory() {
  window.location.href = "history.html";
}

async function withdraw() {
  const amount = prompt("Enter amount:");
  const pin = prompt("Enter PIN:");

  const res = await fetch(`${API}/withdraw`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email,
      amount: Number(amount),
      pin
    })
  });

  const data = await res.json();

  alert(data.message || data.detail);
}

loadUser();
</script>

</body>
  </html>
