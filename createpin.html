<!DOCTYPE html>
<html>
<head>
  <title>Create PIN</title>
  <style>
    body {
      font-family: Arial;
      background: #0a0f2c;
      color: white;
      text-align: center;
      padding-top: 100px;
    }

    input {
      padding: 12px;
      width: 80%;
      margin: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 12px;
      width: 85%;
      background: #00c853;
      color: white;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h2>Create Transaction PIN</h2>

<input type="password" id="pin" placeholder="Enter 4-digit PIN">
<br>
<input type="password" id="confirm" placeholder="Confirm PIN">
<br>

<button onclick="setPin()">Continue</button>

<script>
const API = "https://zyppayxvest-backend.onrender.com";

// 👇 get email from signup
const email = localStorage.getItem("email");

async function setPin() {
  const pin = document.getElementById("pin").value;
  const confirm = document.getElementById("confirm").value;

  if (pin.length !== 4) {
    alert("PIN must be 4 digits");
    return;
  }

  if (pin !== confirm) {
    alert("PINs do not match");
    return;
  }

  const res = await fetch(`${API}/set-pin`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email,
      pin
    })
  });

  const data = await res.json();

  if (res.ok) {
    alert("PIN set successfully");
    window.location.href = "dashboard.html";
  } else {
    alert(data.detail);
  }
}
</script>

</body>
</html>
