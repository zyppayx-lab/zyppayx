<!DOCTYPE html>
<html>
<head>
  <title>Create PIN</title>
  <style>
    body {
      background: #0a0f2c;
      color: white;
      font-family: Arial;
      text-align: center;
      padding-top: 100px;
    }

    .pin-box {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 20px;
    }

    input {
      width: 50px;
      height: 50px;
      font-size: 24px;
      text-align: center;
      border-radius: 10px;
      border: none;
    }

    button {
      padding: 12px;
      width: 80%;
      background: #00c853;
      border: none;
      border-radius: 10px;
      color: white;
    }
  </style>
</head>

<body>

<h2>Create PIN</h2>

<div class="pin-box">
  <input maxlength="1" id="p1">
  <input maxlength="1" id="p2">
  <input maxlength="1" id="p3">
  <input maxlength="1" id="p4">
</div>

<button onclick="setPin()">Continue</button>

<script>
const API = "https://zyppayxvest-backend.onrender.com";
const email = localStorage.getItem("email");

function getPin() {
  return (
    document.getElementById("p1").value +
    document.getElementById("p2").value +
    document.getElementById("p3").value +
    document.getElementById("p4").value
  );
}

async function setPin() {
  const pin = getPin();

  if (pin.length !== 4) {
    alert("Enter complete PIN");
    return;
  }

  const res = await fetch(`${API}/set-pin`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, pin })
  });

  const data = await res.json();

  if (res.ok) {
    alert("PIN set successfully");
    window.location.href = "dashboard.html";
  } else {
    alert(data.detail);
  }
}
</script>

</body>
</html>
