<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create PIN</title>

<style>
body {
  font-family: Arial;
  background:#f6f8fb;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.box {
  background:#fff;
  padding:25px;
  border-radius:12px;
  width:100%;
  max-width:350px;
  text-align:center;
}

h3 { color:#0a1f44; }

.pin-dots {
  display:flex;
  justify-content:center;
  gap:15px;
  margin:20px 0;
}

.dot {
  width:18px;
  height:18px;
  border-radius:50%;
  border:2px solid #ccc;
}

.filled {
  background:#00c896;
  border-color:#00c896;
}

.keypad {
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:10px;
}

.keypad button {
  padding:15px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#eee;
}

.keypad button:active {
  background:#ddd;
}

.loader {
  border: 4px solid #f3f3f3;
  border-top: 4px solid #00c896;
  border-radius: 50%;
  width: 25px;
  height: 25px;
  animation: spin 1s linear infinite;
  margin: 15px auto;
  display:none;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background:#333;
  color:#fff;
  padding:10px 20px;
  border-radius:6px;
  display:none;
}

.success {
  font-size:40px;
  color:#00c896;
  display:none;
}
</style>
</head>

<body>

<div class="box">

<h3>Create 4-digit PIN</h3>

<div class="pin-dots" id="dots">
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>

<div class="success" id="success">✔</div>
<div class="loader" id="loader"></div>

<div class="keypad" id="keypad"></div>

</div>

<div class="toast" id="toast"></div>

<script type="module">

/* =========================
   🔥 CLOUD API FUNCTION
   ========================= */
async function apiCall(endpoint, data){
  const res = await fetch(`https://YOUR_CLOUD_FUNCTION_URL/${endpoint}`,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(data)
  });
  return await res.json();
}

/* =========================
   UI ELEMENTS
   ========================= */
const dots = document.querySelectorAll(".dot");
const keypad = document.getElementById("keypad");
const toast = document.getElementById("toast");
const loader = document.getElementById("loader");
const success = document.getElementById("success");

let pin = "";

/* =========================
   TOAST
   ========================= */
function showToast(msg){
  toast.textContent = msg;
  toast.style.display = "block";
  setTimeout(()=> toast.style.display="none",3000);
}

/* =========================
   UPDATE DOTS
   ========================= */
function updateDots(){
  dots.forEach((d,i)=>{
    d.classList.toggle("filled", i < pin.length);
  });
}

/* =========================
   HANDLE INPUT
   ========================= */
function handleInput(num){
  if(pin.length >= 4) return;

  pin += num;
  updateDots();

  if(pin.length === 4){
    submitPin();
  }
}

function handleDelete(){
  pin = pin.slice(0,-1);
  updateDots();
}

/* =========================
   SUBMIT PIN (CLOUD READY)
   ========================= */
async function submitPin(){
  loader.style.display = "block";

  try{
    const res = await apiCall("createPin", { pin });

    if(!res.success){
      showToast(res.message || "Error");
      loader.style.display = "none";
      pin = "";
      updateDots();
      return;
    }

    success.style.display = "block";

    setTimeout(()=>{
      window.location.href = "dashboard.html";
    },1000);

  }catch(err){
    showToast("Network error");
  }

  loader.style.display = "none";
}

/* =========================
   BUILD KEYPAD
   ========================= */
const keys = [1,2,3,4,5,6,7,8,9,"",0,"⌫"];

keys.forEach(k=>{
  const btn = document.createElement("button");
  btn.textContent = k;

  if(k === ""){
    btn.style.visibility = "hidden";
  }

  btn.onclick = ()=>{
    if(k === "⌫") handleDelete();
    else handleInput(k);
  };

  keypad.appendChild(btn);
});
</script>

</body>
  </html>
