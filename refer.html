<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyppayxvest | Refer</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f6f8fb;
}

header {
  background:#0a1f44;
  color:#fff;
  padding:20px;
  text-align:center;
}

.container {
  max-width:600px;
  margin:auto;
  padding:15px;
}

.card {
  background:#fff;
  padding:18px;
  border-radius:12px;
  margin-bottom:20px;
}

h3 { margin:0 0 10px; }

.copy-box {
  display:flex;
  gap:10px;
  margin-top:10px;
}

.copy-box input {
  flex:1;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  padding:10px 15px;
  background:#00c896;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.stats {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.stat-card {
  background:#fff;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

.badge {
  background:#00c896;
  color:#fff;
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
}

.toast {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#0a1f44;
  color:#fff;
  padding:10px 20px;
  border-radius:8px;
  display:none;
}
</style>
</head>

<body>

<header>Refer & Earn</header>

<div class="container">

<!-- USER TIER -->
<div class="card">
  <h3>Your Level</h3>
  <p><span id="tierBadge" class="badge">Tier 1</span></p>
</div>

<!-- REFERRAL -->
<div class="card">
  <h3>Your Referral Link</h3>

  <div class="copy-box">
    <input id="refLink" readonly>
    <button onclick="copyText('refLink')">Copy</button>
  </div>

  <h3 style="margin-top:15px;">Your Code</h3>

  <div class="copy-box">
    <input id="refCode" readonly>
    <button onclick="copyText('refCode')">Copy</button>
  </div>

  <button style="margin-top:10px;" onclick="shareWhatsApp()">Invite via WhatsApp</button>

  <p style="margin-top:10px;color:#666;">
    Earn ₦200 per verified referral
  </p>
</div>

<!-- STATS -->
<div class="stats">
  <div class="stat-card">
    <h3 id="totalRef">0</h3>
    <p>Referrals</p>
  </div>

  <div class="stat-card">
    <h3>₦<span id="earnings">0</span></h3>
    <p>Total Earned</p>
  </div>
</div>

<!-- LEADERBOARD -->
<div class="card">
  <h3>Top Referrers 🏆</h3>
  <div id="leaderboard">Loading...</div>
</div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore,
  doc,
  getDoc,
  collection,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 CONFIG (READY FOR CLOUD FUNCTIONS)
const app = initializeApp({
  apiKey: "AIzaSyCQ8TCMUAySwLSBN3-0W1GV4XWateS1rqQ",
  authDomain: "zyppayx-69c54.firebaseapp.com",
  projectId: "zyppayx-69c54"
});

const auth = getAuth(app);
const db = getFirestore(app);

// 🔥 CONSTANT (CLOUD WILL CONTROL THIS TOMORROW)
const BONUS_PER_REF = 200;

// TOAST
function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  setTimeout(()=> t.style.display="none",2000);
}

// COPY
window.copyText = (id)=>{
  const input = document.getElementById(id);
  input.select();
  document.execCommand("copy");
  showToast("Copied!");
};

// WHATSAPP SHARE
window.shareWhatsApp = ()=>{
  const link = document.getElementById("refLink").value;
  const text = `Join Zyppayxvest and earn daily 💰\n\n${link}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
};

// LOAD USER
onAuthStateChanged(auth, async user=>{
  if(!user) return location.href="login.html";

  const snap = await getDoc(doc(db,"users",user.uid));
  if(!snap.exists()) return;

  const data = snap.data();

  // REF LINK
  const code = data.referralCode;
  const link = `${window.location.origin}/login.html?ref=${code}`;

  document.getElementById("refLink").value = link;
  document.getElementById("refCode").value = code;

  // TIER DISPLAY (AUTO READY)
  const tier = data.tier || 1;
  document.getElementById("tierBadge").textContent = "Tier " + tier;

  // 🔥 REAL REFERRAL COUNT
  const q = query(
    collection(db,"users"),
    where("referredBy","==",code)
  );

  const refSnap = await getDocs(q);
  const total = refSnap.size;

  // ⚠️ DISPLAY ONLY (CLOUD FUNCTION WILL HANDLE REAL CREDIT)
  const earnings = total * BONUS_PER_REF;

  document.getElementById("totalRef").textContent = total;
  document.getElementById("earnings").textContent = earnings;

  loadLeaderboard();
});

// LEADERBOARD
async function loadLeaderboard(){
  const box = document.getElementById("leaderboard");

  const snap = await getDocs(collection(db,"users"));

  let users = [];

  snap.forEach(doc=>{
    const d = doc.data();
    users.push({
      name: d.fullName || "User",
      refs: d.referrals || 0
    });
  });

  users.sort((a,b)=> b.refs - a.refs);

  box.innerHTML = "";

  users.slice(0,10).forEach((u,i)=>{
    const div = document.createElement("div");
    div.style.padding = "8px 0";
    div.innerHTML = `${i+1}. ${u.name} - ${u.refs} referrals`;
    box.appendChild(div);
  });
}
</script>

</body>
</html>
